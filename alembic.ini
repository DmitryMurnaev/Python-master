[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]

[formatters]

[loggers.root]
level = WARN
handlers =
qualname =

[loggers.sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[loggers.alembic]
level = INFO
handlers =
qualname = alembic

[handlers.root]
level = WARN
handlers =

[formatters.root]
format = %(levelname)-5.5s [%(name)s] %(message)s
description = %(message)s