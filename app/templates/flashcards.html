<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мои карточки - Python Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .flashcard { perspective: 1000px; }
        .flashcard-inner { transition: transform 0.6s; transform-style: preserve-3d; }
        .flashcard.flipped .flashcard-inner { transform: rotateY(180deg); }
        .flashcard-front, .flashcard-back { backface-visibility: hidden; }
        .flashcard-back { transform: rotateY(180deg); }
    </style>
</head>
<body class="bg-gray-900 text-gray-100">
    <nav class="bg-gray-800 border-b border-gray-700">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center space-x-4">
                    <a href="/" class="text-2xl">🐍</a>
                    <a href="/dashboard" class="text-gray-400 hover:text-white">← Дашборд</a>
                </div>
                {% if user %}
                <div class="flex items-center space-x-4">
                    <span class="text-green-400">XP: {{ user.xp }}</span>
                </div>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 py-8">
        <div class="flex items-center justify-between mb-8">
            <h1 class="text-3xl font-bold">📚 Мои карточки</h1>
            <button onclick="showCreateModal()" class="bg-green-600 hover:bg-green-700 px-6 py-3 rounded-lg font-semibold">
                + Создать карточку
            </button>
        </div>

        <!-- Tabs -->
        <div class="flex border-b border-gray-700 mb-6">
            <button class="tab-btn active px-6 py-3 text-gray-400 hover:text-white" onclick="showTab('all')">Все карточки</button>
            <button class="tab-btn px-6 py-3 text-gray-400 hover:text-white" onclick="showTab('study')">Повторение</button>
            <button class="tab-btn px-6 py-3 text-gray-400 hover:text-white" onclick="showTab('stats')">Статистика</button>
        </div>

        <!-- All Cards Tab -->
        <div id="all-tab" class="tab-content">
            <div class="mb-4 flex gap-4">
                <select id="filter-block" onchange="loadCards()" class="bg-gray-800 text-gray-100 px-4 py-2 rounded-lg">
                    <option value="">Все блоки</option>
                    {% for block in blocks %}
                    <option value="{{ block.id }}">{{ block.icon }} {{ block.title }}</option>
                    {% endfor %}
                </select>
            </div>
            <div id="cards-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <!-- Cards loaded dynamically -->
            </div>
        </div>

        <!-- Study Tab -->
        <div id="study-tab" class="tab-content hidden">
            <div class="mb-6">
                <h2 class="text-xl font-bold mb-4">Повторение карточек</h2>
                <p class="text-gray-400">Нажмите на карточку чтобы увидеть ответ. Оцените насколько хорошо вы знаете ответ.</p>
            </div>
            <div id="study-cards" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <!-- Study cards loaded dynamically -->
            </div>
        </div>

        <!-- Stats Tab -->
        <div id="stats-tab" class="tab-content hidden">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
                <div class="bg-gray-800 rounded-xl p-6 text-center">
                    <div class="text-4xl font-bold text-green-400" id="stat-total">0</div>
                    <div class="text-gray-400">Всего карточек</div>
                </div>
                <div class="bg-gray-800 rounded-xl p-6 text-center">
                    <div class="text-4xl font-bold text-yellow-400" id="stat-due">0</div>
                    <div class="text-gray-400">На повторение</div>
                </div>
                <div class="bg-gray-800 rounded-xl p-6 text-center">
                    <div class="text-4xl font-bold text-blue-400" id="stat-learning">0</div>
                    <div class="text-gray-400">В процессе</div>
                </div>
                <div class="bg-gray-800 rounded-xl p-6 text-center">
                    <div class="text-4xl font-bold text-purple-400" id="stat-mastered">0</div>
                    <div class="text-gray-400">Освоено</div>
                </div>
            </div>
        </div>
    </main>

    <!-- Create Card Modal -->
    <div id="create-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
        <div class="bg-gray-800 rounded-xl p-6 w-full max-w-md">
            <h2 class="text-xl font-bold mb-4">Создать карточку</h2>
            <div class="mb-4">
                <label class="block text-sm text-gray-400 mb-2">Вопрос (передняя сторона):</label>
                <textarea id="card-question" class="w-full bg-gray-900 text-gray-100 p-3 rounded-lg h-24" placeholder="Введите вопрос..."></textarea>
            </div>
            <div class="mb-4">
                <label class="block text-sm text-gray-400 mb-2">Ответ (задняя сторона):</label>
                <textarea id="card-answer" class="w-full bg-gray-900 text-gray-100 p-3 rounded-lg h-24" placeholder="Введите ответ..."></textarea>
            </div>
            <div class="mb-4">
                <label class="block text-sm text-gray-400 mb-2">Блок (опционально):</label>
                <select id="card-block" class="w-full bg-gray-900 text-gray-100 p-3 rounded-lg">
                    <option value="">Без блока</option>
                    {% for block in blocks %}
                    <option value="{{ block.id }}">{{ block.icon }} {{ block.title }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="flex gap-4">
                <button onclick="createCard()" class="bg-green-600 hover:bg-green-700 px-6 py-2 rounded-lg flex-1">Создать</button>
                <button onclick="hideCreateModal()" class="bg-gray-600 hover:bg-gray-700 px-6 py-2 rounded-lg">Отмена</button>
            </div>
        </div>
    </div>

    <script>
        let currentTab = 'all';

        function showTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tabName + '-tab').classList.remove('hidden');
            event.target.classList.add('active');
            currentTab = tabName;

            if (tabName === 'study') loadStudyCards();
            if (tabName === 'stats') loadStats();
        }

        async function loadCards() {
            const blockId = document.getElementById('filter-block').value;
            const url = '/api/flashcards/' + (blockId ? '?block_id=' + blockId : '');
            try {
                const response = await fetch(url);
                const cards = await response.json();
                displayCards(cards);
            } catch (error) {
                console.error('Error loading cards:', error);
            }
        }

        function displayCards(cards) {
            const container = document.getElementById('cards-list');
            if (cards.length === 0) {
                container.innerHTML = '<div class="col-span-full text-center text-gray-400 py-8">У вас пока нет карточек. Создайте первую!</div>';
                return;
            }
            container.innerHTML = cards.map(card => `
                <div class="bg-gray-800 rounded-xl p-4">
                    <div class="flex justify-between items-start mb-2">
                        <span class="text-xs text-gray-500">${card.next_review_date ? '📅 ' + new Date(card.next_review_date).toLocaleDateString() : ''}</span>
                        <button onclick="deleteCard(${card.id})" class="text-red-400 hover:text-red-300 text-sm">✕</button>
                    </div>
                    <div class="font-medium mb-2">${card.question}</div>
                    <div class="text-gray-400 text-sm">${card.answer}</div>
                    <div class="mt-3 flex gap-2">
                        <span class="text-xs bg-gray-700 px-2 py-1 rounded">Интервал: ${card.interval} дн.</span>
                        <span class="text-xs bg-gray-700 px-2 py-1 rounded">Повторений: ${card.repetitions}</span>
                    </div>
                </div>
            `).join('');
        }

        async function loadStudyCards() {
            try {
                const response = await fetch('/api/flashcards/study?limit=20');
                const data = await response.json();
                displayStudyCards(data.cards);
            } catch (error) {
                console.error('Error loading study cards:', error);
            }
        }

        function displayStudyCards(cards) {
            const container = document.getElementById('study-cards');
            if (cards.length === 0) {
                container.innerHTML = '<div class="col-span-full text-center text-gray-400 py-8">Нет карточек для повторения. Зайдите позже!</div>';
                return;
            }
            container.innerHTML = cards.map(card => `
                <div class="flashcard bg-gray-800 rounded-xl p-4 cursor-pointer" onclick="this.classList.toggle('flipped')">
                    <div class="flashcard-inner relative">
                        <div class="flashcard-front">
                            <div class="font-medium">${card.question}</div>
                        </div>
                        <div class="flashcard-back absolute inset-0">
                            <div class="text-gray-400 text-sm">Ответ:</div>
                            <div class="font-medium">${card.answer}</div>
                        </div>
                    </div>
                    <div class="mt-4 flex gap-2">
                        <button onclick="event.stopPropagation(); rateCard(${card.id}, 0)" class="bg-red-600 hover:bg-red-700 px-3 py-1 rounded text-sm">Не помню</button>
                        <button onclick="event.stopPropagation(); rateCard(${card.id}, 3)" class="bg-yellow-600 hover:bg-yellow-700 px-3 py-1 rounded text-sm">Помню</button>
                        <button onclick="event.stopPropagation(); rateCard(${card.id}, 5)" class="bg-green-600 hover:bg-green-700 px-3 py-1 rounded text-sm">Легко</button>
                    </div>
                </div>
            `).join('');
        }

        async function rateCard(cardId, quality) {
            try {
                await fetch('/api/flashcards/review', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ card_id: cardId, quality })
                });
                loadStudyCards();
            } catch (error) {
                console.error('Error rating card:', error);
            }
        }

        async function loadStats() {
            try {
                const response = await fetch('/api/flashcards/stats');
                const stats = await response.json();
                document.getElementById('stat-total').textContent = stats.total_cards;
                document.getElementById('stat-due').textContent = stats.cards_due_today;
                document.getElementById('stat-learning').textContent = stats.cards_learning;
                document.getElementById('stat-mastered').textContent = stats.cards_mastered;
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }

        function showCreateModal() {
            document.getElementById('create-modal').classList.remove('hidden');
        }

        function hideCreateModal() {
            document.getElementById('create-modal').classList.add('hidden');
        }

        async function createCard() {
            const question = document.getElementById('card-question').value;
            const answer = document.getElementById('card-answer').value;
            const blockId = document.getElementById('card-block').value;

            if (!question || !answer) {
                alert('Введите вопрос и ответ');
                return;
            }

            try {
                const response = await fetch('/api/flashcards/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        question,
                        answer,
                        block_id: blockId ? parseInt(blockId) : null
                    })
                });
                if (response.ok) {
                    hideCreateModal();
                    document.getElementById('card-question').value = '';
                    document.getElementById('card-answer').value = '';
                    loadCards();
                }
            } catch (error) {
                console.error('Error creating card:', error);
            }
        }

        async function deleteCard(cardId) {
            if (!confirm('Удалить эту карточку?')) return;
            try {
                await fetch('/api/flashcards/' + cardId, { method: 'DELETE' });
                loadCards();
            } catch (error) {
                console.error('Error deleting card:', error);
            }
        }

        // Load blocks for filter and initial cards
        async function loadBlocks() {
            try {
                const response = await fetch('/api/blocks/');
                const blocks = await response.json();
                // Already rendered in template
                loadCards();
            } catch (error) {
                console.error('Error loading blocks:', error);
                loadCards();
            }
        }

        loadBlocks();
    </script>
</body>
</html>
