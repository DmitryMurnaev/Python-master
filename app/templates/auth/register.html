<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - Python Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex items-center justify-center">
    <div class="w-full max-w-md p-8">
        <div class="text-center mb-8">
            <a href="/" class="text-4xl">🐍</a>
            <h1 class="text-2xl font-bold mt-4">Python Master</h1>
            <p class="text-gray-400 mt-2">Создайте свой аккаунт</p>
        </div>

        <form method="post" class="space-y-6">
            <div>
                <label class="block text-sm font-medium mb-2">Имя пользователя</label>
                <input type="text" name="username" required minlength="3"
                    class="w-full px-4 py-3 bg-gray-800 border border-gray-700 rounded-lg focus:outline-none focus:border-green-500"
                    placeholder="ivanov">
            </div>

            <div>
                <label class="block text-sm font-medium mb-2">Email</label>
                <input type="email" name="email" required
                    class="w-full px-4 py-3 bg-gray-800 border border-gray-700 rounded-lg focus:outline-none focus:border-green-500"
                    placeholder="ivan@email.com">
            </div>

            <div>
                <label class="block text-sm font-medium mb-2">Пароль</label>
                <input type="password" name="password" required minlength="6"
                    class="w-full px-4 py-3 bg-gray-800 border border-gray-700 rounded-lg focus:outline-none focus:border-green-500"
                    placeholder="Минимум 6 символов">
            </div>

            <button type="submit"
                class="w-full bg-green-600 hover:bg-green-700 py-3 rounded-lg font-semibold transition">
                Зарегистрироваться
            </button>
        </form>

        <p class="text-center mt-6 text-gray-400">
            Уже есть аккаунт? <a href="/auth/login" class="text-green-400 hover:underline">Войти</a>
        </p>
    </div>
</body>
</html>
