<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Вход - Python Master{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex items-center justify-center">
    <div class="w-full max-w-md p-8">
        <div class="text-center mb-8">
            <a href="/" class="text-4xl">🐍</a>
            <h1 class="text-2xl font-bold mt-4">Python Master</h1>
        </div>

        {% block content %}
        <form method="post" class="space-y-6">
            <div>
                <label class="block text-sm font-medium mb-2">Email</label>
                <input type="email" name="email" required
                    class="w-full px-4 py-3 bg-gray-800 border border-gray-700 rounded-lg focus:outline-none focus:border-green-500"
                    placeholder="your@email.com">
            </div>

            <div>
                <label class="block text-sm font-medium mb-2">Пароль</label>
                <input type="password" name="password" required
                    class="w-full px-4 py-3 bg-gray-800 border border-gray-700 rounded-lg focus:outline-none focus:border-green-500"
                    placeholder="••••••••">
            </div>

            {% if error %}
            <div class="bg-red-900/50 border border-red-700 text-red-400 px-4 py-3 rounded-lg">
                {{ error }}
            </div>
            {% endif %}

            <button type="submit"
                class="w-full bg-green-600 hover:bg-green-700 py-3 rounded-lg font-semibold transition">
                Войти
            </button>
        </form>

        <p class="text-center mt-6 text-gray-400">
            Нет аккаунта? <a href="/auth/register" class="text-green-400 hover:underline">Зарегистрируйтесь</a>
        </p>
        {% endblock %}
    </div>
</body>
</html>
